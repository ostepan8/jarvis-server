<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. — Night Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slowPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #111318;
            color: #9ca3af;
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 14px;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Nav */
        .nav {
            display: flex;
            gap: 1px;
            margin-bottom: 24px;
            background: #1e2028;
            border-radius: 6px;
            overflow: hidden;
            width: fit-content;
        }
        .nav-link {
            background: transparent;
            border: none;
            color: #6b7280;
            padding: 8px 16px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-link:hover {
            color: #d1d5db;
            background: #262830;
        }
        .nav-link.active {
            color: #e5e7eb;
            background: #2a2d37;
        }

        /* Header */
        header {
            background: #16181f;
            border: 1px solid #22252e;
            border-radius: 8px;
            padding: 24px 28px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.1em;
            font-weight: 600;
            color: #e5e7eb;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        header h1 span {
            color: #6b7280;
            font-weight: 400;
        }
        .header-meta {
            text-align: right;
        }

        /* Status badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7em;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .status-badge .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-idle { border-color: #2a2d37; color: #4b5563; }
        .status-idle .dot { background: #4b5563; }
        .status-running { border-color: #374151; color: #9ca3af; animation: slowPulse 3s infinite; }
        .status-running .dot { background: #6b7280; }
        .status-paused { border-color: #92400e33; color: #b45309; }
        .status-paused .dot { background: #b45309; }
        .status-error { border-color: #991b1b33; color: #dc2626; }
        .status-error .dot { background: #dc2626; }

        .last-poll {
            color: #374151;
            font-size: 0.75em;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Grid layout */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .grid .full-width {
            grid-column: 1 / -1;
        }

        /* Card */
        .card {
            background: #16181f;
            border: 1px solid #22252e;
            border-radius: 8px;
            padding: 20px;
            animation: fadeIn 0.3s ease-out;
        }
        .card-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.7em;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1e2028;
        }

        /* Progress bar */
        .progress-wrapper {
            margin: 10px 0;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin-bottom: 6px;
            color: #6b7280;
            font-family: 'IBM Plex Mono', monospace;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #1e2028;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #4b5563;
            transition: width 0.5s ease;
            border-radius: 2px;
        }
        .progress-fill.active {
            background: #6b7280;
        }

        /* Current task */
        .current-task {
            background: #1a1c24;
            border: 1px solid #22252e;
            border-radius: 6px;
            padding: 14px;
            margin-top: 10px;
        }
        .current-task-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65em;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .current-task-title {
            font-size: 0.95em;
            color: #d1d5db;
            font-weight: 500;
        }

        /* Type badge */
        .type-badge {
            display: inline-block;
            padding: 1px 8px;
            font-size: 0.65em;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid;
            border-radius: 3px;
        }
        .type-test_failure { color: #b91c1c; border-color: #991b1b33; background: #991b1b11; }
        .type-log_error { color: #b45309; border-color: #92400e33; background: #92400e11; }
        .type-code_quality { color: #6b7280; border-color: #37415133; background: #37415111; }
        .type-manual_todo { color: #7c3aed; border-color: #5b21b633; background: #5b21b611; }
        .type-unused_import { color: #a16207; border-color: #854d0e33; background: #854d0e11; }
        .type-exception_antipattern { color: #b91c1c; border-color: #991b1b33; background: #991b1b11; }
        .type-complexity_hotspot { color: #047857; border-color: #06543b33; background: #06543b11; }
        .type-missing_tests { color: #a16207; border-color: #854d0e33; background: #854d0e11; }
        .type-dead_code { color: #4b5563; border-color: #37415133; background: #37415111; }
        .type-stale_comment { color: #4b5563; border-color: #37415133; background: #37415111; }
        .type-trace_error_rate { color: #b91c1c; border-color: #991b1b33; background: #991b1b11; }
        .type-trace_slow_agent { color: #b45309; border-color: #92400e33; background: #92400e11; }

        /* Complexity badge */
        .complexity-badge {
            display: inline-block;
            padding: 1px 6px;
            font-size: 0.65em;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 500;
            border-radius: 3px;
            color: #6b7280;
            background: #1e2028;
        }

        /* Priority pill */
        .priority-pill {
            display: inline-block;
            padding: 1px 6px;
            font-size: 0.65em;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 3px;
            font-family: 'IBM Plex Mono', monospace;
        }
        .priority-urgent { background: #991b1b22; color: #dc2626; }
        .priority-high { background: #92400e22; color: #b45309; }
        .priority-medium { background: #1e2028; color: #6b7280; }
        .priority-low { background: #1e2028; color: #4b5563; }

        /* Results feed */
        .result-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #1e2028;
            animation: fadeIn 0.3s ease-out;
            cursor: pointer;
            transition: background 0.15s;
            margin: 0 -8px;
            padding-left: 8px;
            padding-right: 8px;
            border-radius: 4px;
        }
        .result-item:hover { background: #1a1c24; }
        .result-item:last-child { border-bottom: none; }

        .result-icon {
            font-size: 0.9em;
            min-width: 20px;
            text-align: center;
            margin-top: 2px;
            font-family: 'IBM Plex Mono', monospace;
        }
        .result-icon.success { color: #059669; }
        .result-icon.failure { color: #dc2626; }
        .result-icon.skipped { color: #374151; }

        .result-body { flex: 1; }
        .result-title {
            font-weight: 500;
            color: #d1d5db;
            margin-bottom: 3px;
            font-size: 0.9em;
        }
        .result-meta {
            font-size: 0.8em;
            color: #4b5563;
        }
        .result-error {
            font-size: 0.8em;
            color: #dc2626;
            margin-top: 4px;
            padding: 6px 10px;
            background: #991b1b0a;
            border-left: 2px solid #991b1b33;
            font-family: 'IBM Plex Mono', monospace;
            word-break: break-all;
            border-radius: 0 3px 3px 0;
        }
        .result-pr {
            display: inline-block;
            margin-top: 4px;
            color: #6b7280;
            text-decoration: none;
            font-size: 0.8em;
            border-bottom: 1px solid #22252e;
            transition: color 0.2s;
        }
        .result-pr:hover { color: #9ca3af; border-bottom-color: #4b5563; }

        .results-scroll {
            max-height: 420px;
            overflow-y: auto;
        }
        .results-scroll::-webkit-scrollbar { width: 3px; }
        .results-scroll::-webkit-scrollbar-track { background: transparent; }
        .results-scroll::-webkit-scrollbar-thumb { background: #22252e; border-radius: 3px; }

        /* Backlog table */
        .backlog-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }
        .backlog-table th {
            text-align: left;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65em;
            font-weight: 600;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 10px;
            border-bottom: 1px solid #22252e;
        }
        .backlog-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #1e2028;
            color: #9ca3af;
        }
        .backlog-table tr {
            cursor: pointer;
            transition: background 0.15s;
        }
        .backlog-table tr:hover td {
            background: #1a1c24;
        }
        .backlog-id {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85em;
            color: #374151;
        }

        /* Summary stats */
        .stats-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stat {
            flex: 1;
            min-width: 100px;
            text-align: center;
            padding: 14px;
            background: #1a1c24;
            border: 1px solid #22252e;
            border-radius: 6px;
        }
        .stat-value {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.5em;
            font-weight: 600;
            color: #9ca3af;
        }
        .stat-value.success { color: #059669; }
        .stat-value.failure { color: #dc2626; }
        .stat-value.neutral { color: #4b5563; }
        .stat-label {
            font-size: 0.7em;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
            font-family: 'IBM Plex Mono', monospace;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 32px;
            color: #374151;
        }
        .empty-state-icon {
            font-size: 1.5em;
            margin-bottom: 8px;
            opacity: 0.4;
        }

        /* Ticket detail panel (slide-over) */
        .ticket-overlay {
            display: none;
            position: fixed;
            top: 0; right: 0;
            width: 100%; height: 100%;
            z-index: 100;
        }
        .ticket-overlay.open { display: flex; justify-content: flex-end; }
        .ticket-backdrop {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }
        .ticket-panel {
            position: relative;
            width: 560px;
            max-width: 90vw;
            height: 100%;
            background: #16181f;
            border-left: 1px solid #22252e;
            overflow-y: auto;
            animation: slideIn 0.2s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .ticket-header {
            padding: 24px;
            border-bottom: 1px solid #22252e;
            position: sticky;
            top: 0;
            background: #16181f;
            z-index: 1;
        }
        .ticket-close {
            float: right;
            background: none;
            border: 1px solid #22252e;
            color: #6b7280;
            font-size: 0.8em;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.15s;
        }
        .ticket-close:hover { color: #d1d5db; border-color: #374151; }
        .ticket-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #e5e7eb;
            margin-bottom: 8px;
            padding-right: 60px;
        }
        .ticket-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .ticket-body {
            padding: 24px;
        }
        .ticket-section {
            margin-bottom: 20px;
        }
        .ticket-section-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65em;
            font-weight: 600;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        .ticket-section p,
        .ticket-section li {
            color: #9ca3af;
            font-size: 0.9em;
            line-height: 1.6;
        }
        .ticket-section ul {
            list-style: none;
            padding: 0;
        }
        .ticket-section li {
            padding: 3px 0;
            padding-left: 16px;
            position: relative;
        }
        .ticket-section li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 11px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #374151;
        }
        .ticket-files {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8em;
        }
        .ticket-files li {
            color: #6b7280;
        }
        .ticket-code {
            background: #111318;
            border: 1px solid #22252e;
            border-radius: 4px;
            padding: 12px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8em;
            color: #6b7280;
            white-space: pre-wrap;
            overflow-x: auto;
            line-height: 1.6;
        }
        .ticket-workflow {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85em;
            color: #6b7280;
            background: #1a1c24;
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 12px; }
            .header-meta { text-align: left; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/admin/dashboard/html" class="nav-link">Admin</a>
            <a href="/admin/logs/html" class="nav-link">Logs</a>
            <a href="/self-improvement/dashboard" class="nav-link active">Night Mode</a>
        </nav>

        <header>
            <div>
                <h1>Night <span>Mode</span></h1>
            </div>
            <div class="header-meta">
                <div id="statusBadge" class="status-badge status-idle">
                    <span class="dot"></span>
                    <span id="statusText">Idle</span>
                </div>
                <div id="lastPoll" class="last-poll">&mdash;</div>
            </div>
        </header>

        <div class="grid">
            <div class="card" id="progressCard">
                <div class="card-title">Live Progress</div>
                <div id="progressContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">&middot;</div>
                        No active cycle. Waiting for nightfall.
                    </div>
                </div>
            </div>

            <div class="card" id="summaryCard">
                <div class="card-title">Last Report</div>
                <div id="summaryContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">&mdash;</div>
                        No reports on file yet.
                    </div>
                </div>
            </div>

            <div class="card full-width" id="resultsCard">
                <div class="card-title">Results</div>
                <div id="resultsContent" class="results-scroll">
                    <div class="empty-state">
                        <div class="empty-state-icon">&hellip;</div>
                        Results appear here once a cycle runs.
                    </div>
                </div>
            </div>

            <div class="card full-width" id="backlogCard">
                <div class="card-title">Backlog</div>
                <div id="backlogContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">&middot;</div>
                        Backlog is empty.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ticket detail slide-over -->
    <div class="ticket-overlay" id="ticketOverlay">
        <div class="ticket-backdrop" onclick="closeTicket()"></div>
        <div class="ticket-panel">
            <div class="ticket-header">
                <button class="ticket-close" onclick="closeTicket()">esc</button>
                <div class="ticket-title" id="ticketTitle"></div>
                <div class="ticket-tags" id="ticketTags"></div>
            </div>
            <div class="ticket-body" id="ticketBody"></div>
        </div>
    </div>

    <script>
    const POLL_INTERVAL = 3000;
    let lastData = null;
    let allDiscoveries = [];

    function formatDuration(seconds) {
        if (!seconds || seconds < 0) return '\u2014';
        if (seconds < 60) return seconds.toFixed(1) + 's';
        const m = Math.floor(seconds / 60);
        const s = (seconds % 60).toFixed(0);
        return m + 'm ' + s + 's';
    }

    function formatTime(iso) {
        if (!iso) return '\u2014';
        try {
            const d = new Date(iso);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } catch { return iso; }
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function typeBadge(type) {
        const clean = (type || '').replace('DiscoveryType.', '');
        return '<span class="type-badge type-' + clean + '">' + clean.replace(/_/g, ' ') + '</span>';
    }

    function priorityPill(p) {
        const pr = (p || 'medium').toLowerCase();
        return '<span class="priority-pill priority-' + pr + '">' + pr + '</span>';
    }

    function complexityBadge(c) {
        if (!c) return '';
        return '<span class="complexity-badge">' + escapeHtml(c) + '</span>';
    }

    function resultIcon(success, skipped) {
        if (skipped) return '<div class="result-icon skipped">-</div>';
        return success
            ? '<div class="result-icon success">+</div>'
            : '<div class="result-icon failure">x</div>';
    }

    // ---------------------------------------------------------------
    // Ticket detail panel
    // ---------------------------------------------------------------
    function openTicket(discovery) {
        const overlay = document.getElementById('ticketOverlay');
        const title = document.getElementById('ticketTitle');
        const tags = document.getElementById('ticketTags');
        const body = document.getElementById('ticketBody');

        title.textContent = discovery.title || 'Untitled';

        let tagsHtml = typeBadge(discovery.discovery_type);
        tagsHtml += ' ' + priorityPill(discovery.priority);
        if (discovery.estimated_complexity) {
            tagsHtml += ' ' + complexityBadge(discovery.estimated_complexity);
        }
        if (discovery.workflow) {
            tagsHtml += ' <span class="ticket-workflow">' + escapeHtml(discovery.workflow) + '</span>';
        }
        tags.innerHTML = tagsHtml;

        let html = '';

        // User Story
        if (discovery.user_story) {
            html += '<div class="ticket-section">';
            html += '<div class="ticket-section-title">User Story</div>';
            html += '<p>' + escapeHtml(discovery.user_story) + '</p>';
            html += '</div>';
        }

        // Description
        html += '<div class="ticket-section">';
        html += '<div class="ticket-section-title">Description</div>';
        html += '<p>' + escapeHtml(discovery.description) + '</p>';
        html += '</div>';

        // Acceptance Criteria
        if (discovery.acceptance_criteria && discovery.acceptance_criteria.length > 0) {
            html += '<div class="ticket-section">';
            html += '<div class="ticket-section-title">Acceptance Criteria</div>';
            html += '<ul>';
            for (const c of discovery.acceptance_criteria) {
                html += '<li>' + escapeHtml(c) + '</li>';
            }
            html += '</ul>';
            html += '</div>';
        }

        // Test Cases
        if (discovery.test_cases && discovery.test_cases.length > 0) {
            html += '<div class="ticket-section">';
            html += '<div class="ticket-section-title">Test Cases</div>';
            html += '<ul>';
            for (const t of discovery.test_cases) {
                html += '<li>' + escapeHtml(t) + '</li>';
            }
            html += '</ul>';
            html += '</div>';
        }

        // Affected Files
        if (discovery.relevant_files && discovery.relevant_files.length > 0) {
            html += '<div class="ticket-section">';
            html += '<div class="ticket-section-title">Affected Files</div>';
            html += '<ul class="ticket-files">';
            for (const f of discovery.relevant_files) {
                html += '<li>' + escapeHtml(f) + '</li>';
            }
            html += '</ul>';
            html += '</div>';
        }

        // Affected Agents
        if (discovery.affected_agents && discovery.affected_agents.length > 0) {
            html += '<div class="ticket-section">';
            html += '<div class="ticket-section-title">Affected Agents</div>';
            html += '<p>' + discovery.affected_agents.map(a => escapeHtml(a)).join(', ') + '</p>';
            html += '</div>';
        }

        // Code Context
        if (discovery.code_context) {
            html += '<div class="ticket-section">';
            html += '<div class="ticket-section-title">Code Context</div>';
            if (discovery.function_scope) {
                html += '<p style="margin-bottom:6px;color:#4b5563;font-size:0.85em">Scope: <span style="color:#6b7280">' + escapeHtml(discovery.function_scope) + '</span></p>';
            }
            html += '<div class="ticket-code">' + escapeHtml(discovery.code_context) + '</div>';
            html += '</div>';
        }

        // Source detail
        if (discovery.source_detail) {
            html += '<div class="ticket-section">';
            html += '<div class="ticket-section-title">Source</div>';
            html += '<p style="font-family:\'IBM Plex Mono\',monospace;font-size:0.85em">' + escapeHtml(discovery.source_detail) + '</p>';
            html += '</div>';
        }

        body.innerHTML = html;
        overlay.classList.add('open');
    }

    function closeTicket() {
        document.getElementById('ticketOverlay').classList.remove('open');
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeTicket();
    });

    // Find a discovery matching a result title
    function findDiscovery(taskTitle) {
        return allDiscoveries.find(d => d.title === taskTitle) || null;
    }

    // ---------------------------------------------------------------
    // Update functions
    // ---------------------------------------------------------------
    function updateStatus(data) {
        const badge = document.getElementById('statusBadge');
        const text = document.getElementById('statusText');
        badge.className = 'status-badge';

        if (data.cycle_error) {
            badge.classList.add('status-error');
            text.textContent = 'Error';
        } else if (data.running || (data.cycle_state && data.cycle_state.status === 'in_progress')) {
            badge.classList.add('status-running');
            text.textContent = 'Running';
        } else if (data.cycle_state && data.cycle_state.status === 'paused') {
            badge.classList.add('status-paused');
            text.textContent = 'Paused';
        } else if (data.night_mode) {
            badge.classList.add('status-running');
            text.textContent = 'Active';
        } else {
            badge.classList.add('status-idle');
            text.textContent = 'Idle';
        }

        document.getElementById('lastPoll').textContent =
            new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function updateProgress(data) {
        const el = document.getElementById('progressContent');
        const cs = data.cycle_state;

        if (!cs && !data.running) {
            if (data.cycle_error) {
                el.innerHTML =
                    '<div class="current-task" style="border-color:#991b1b33">' +
                    '<div class="current-task-label" style="color:#dc2626">Cycle Error</div>' +
                    '<div class="result-error">' + escapeHtml(data.cycle_error) + '</div></div>';
            } else {
                el.innerHTML =
                    '<div class="empty-state"><div class="empty-state-icon">&middot;</div>No active cycle. Waiting for nightfall.</div>';
            }
            return;
        }

        if (!cs) {
            el.innerHTML =
                '<div class="current-task"><div class="current-task-label">Status</div>' +
                '<div class="current-task-title">Cycle running...</div></div>';
            return;
        }

        const done = cs.completed_results ? cs.completed_results.length : 0;
        const total = cs.total_tasks || 0;
        const pct = total > 0 ? Math.round((cs.current_task_index / total) * 100) : 0;
        const isActive = cs.status === 'in_progress';

        let currentTitle = 'Finishing up...';
        if (cs.current_task_index < total && cs.discoveries && cs.discoveries[cs.current_task_index]) {
            currentTitle = cs.discoveries[cs.current_task_index].title || 'Processing...';
        }

        let html = '';
        html += '<div class="progress-wrapper">';
        html += '<div class="progress-label"><span>' + cs.current_task_index + ' / ' + total + '</span>';
        html += '<span>' + pct + '%</span></div>';
        html += '<div class="progress-bar"><div class="progress-fill' + (isActive ? ' active' : '') + '" style="width:' + pct + '%"></div></div>';
        html += '</div>';

        if (isActive && cs.current_task_index < total) {
            html += '<div class="current-task">';
            html += '<div class="current-task-label">Working on</div>';
            html += '<div class="current-task-title">' + escapeHtml(currentTitle) + '</div>';
            html += '</div>';
        } else if (cs.status === 'paused') {
            const remaining = total - cs.current_task_index;
            html += '<div class="current-task" style="border-color:#92400e33">';
            html += '<div class="current-task-label" style="color:#b45309">Paused</div>';
            html += '<div class="current-task-title">' + remaining + ' tasks remaining.</div>';
            html += '</div>';
        }

        if (done > 0) {
            const successes = cs.completed_results.filter(r => r.success).length;
            const failures = done - successes;
            html += '<div class="stats-row" style="margin-top:14px">';
            html += '<div class="stat"><div class="stat-value success">' + successes + '</div><div class="stat-label">Passed</div></div>';
            html += '<div class="stat"><div class="stat-value failure">' + failures + '</div><div class="stat-label">Failed</div></div>';
            html += '<div class="stat"><div class="stat-value neutral">' + cs.skipped_count + '</div><div class="stat-label">Skipped</div></div>';
            html += '</div>';
        }

        el.innerHTML = html;
    }

    function updateSummary(data) {
        const el = document.getElementById('summaryContent');
        const report = data.latest_report;

        if (!report) {
            el.innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">&mdash;</div>No reports on file yet.</div>';
            return;
        }

        let html = '<div class="stats-row">';
        html += '<div class="stat"><div class="stat-value">' + report.tasks_attempted + '</div><div class="stat-label">Attempted</div></div>';
        html += '<div class="stat"><div class="stat-value success">' + report.tasks_succeeded + '</div><div class="stat-label">Passed</div></div>';
        html += '<div class="stat"><div class="stat-value failure">' + report.tasks_failed + '</div><div class="stat-label">Failed</div></div>';
        html += '<div class="stat"><div class="stat-value neutral">' + (report.skipped_count || 0) + '</div><div class="stat-label">Skipped</div></div>';
        html += '</div>';

        html += '<div style="margin-top:14px;font-size:0.8em;font-family:\'IBM Plex Mono\',monospace">';
        html += '<div style="display:flex;gap:24px;flex-wrap:wrap;color:#4b5563">';
        html += '<span>files: <span style="color:#6b7280">' + report.total_files_changed + '</span></span>';
        html += '<span>duration: <span style="color:#6b7280">' + formatDuration(report.total_duration_seconds) + '</span></span>';
        html += '<span>discoveries: <span style="color:#6b7280">' + (report.discoveries_count || '\u2014') + '</span></span>';
        html += '<span>completed: <span style="color:#6b7280">' + formatTime(report.completed_at) + '</span></span>';
        html += '</div></div>';

        el.innerHTML = html;
    }

    function updateResults(data) {
        const el = document.getElementById('resultsContent');
        let results = [];

        if (data.cycle_state && data.cycle_state.completed_results && data.cycle_state.completed_results.length > 0) {
            results = data.cycle_state.completed_results;
        } else if (data.latest_report && data.latest_report.results) {
            results = data.latest_report.results;
        }

        // Cache discoveries for ticket lookup
        if (data.cycle_state && data.cycle_state.discoveries) {
            allDiscoveries = data.cycle_state.discoveries;
        } else if (data.discoveries && data.discoveries.length > 0) {
            allDiscoveries = data.discoveries;
        }

        if (results.length === 0) {
            el.innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">&hellip;</div>Results appear here once a cycle runs.</div>';
            return;
        }

        const reversed = [...results].reverse();
        let html = '';
        for (const r of reversed) {
            const disc = r.discovery || findDiscovery(r.task_title);
            const clickAttr = disc ? ' onclick=\'openTicket(' + JSON.stringify(disc).replace(/'/g, "&#39;") + ')\'' : '';
            html += '<div class="result-item"' + clickAttr + '>';
            html += resultIcon(r.success);
            html += '<div class="result-body">';
            html += '<div class="result-title">' + escapeHtml(r.task_title) + '</div>';
            html += '<div class="result-meta">';
            html += typeBadge(r.discovery_type) + ' ';
            html += '<span style="margin-left:4px">' + formatDuration(r.duration_seconds) + '</span>';
            if (r.files_changed) html += ' &middot; ' + r.files_changed + ' files';
            if (r.test_passed) html += ' &middot; tests passed';
            if (r.merged) html += ' &middot; merged';
            html += '</div>';
            if (r.error_message) {
                html += '<div class="result-error">' + escapeHtml(r.error_message) + '</div>';
            }
            if (r.pr_url) {
                html += '<a href="' + escapeHtml(r.pr_url) + '" target="_blank" class="result-pr" onclick="event.stopPropagation()">View PR &rarr;</a>';
            }
            html += '</div></div>';
        }

        el.innerHTML = html;
    }

    function updateBacklog(data) {
        const el = document.getElementById('backlogContent');
        const items = data.backlog || [];

        if (items.length === 0) {
            el.innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">&middot;</div>Backlog is empty.</div>';
            return;
        }

        let html = '<table class="backlog-table">';
        html += '<thead><tr><th>ID</th><th>Title</th><th>Priority</th><th>Tags</th><th>Created</th></tr></thead>';
        html += '<tbody>';
        for (const item of items) {
            // Use embedded discovery data for ticket panel, or fall back to the discovery cache
            const disc = item.discovery || findDiscovery(item.title);
            const clickAttr = disc ? ' onclick=\'openTicket(' + JSON.stringify(disc).replace(/'/g, "&#39;") + ')\'' : '';
            html += '<tr' + clickAttr + '>';
            html += '<td class="backlog-id">' + escapeHtml((item.id || '').slice(0, 8)) + '</td>';
            html += '<td>' + escapeHtml(item.title || '\u2014') + '</td>';
            html += '<td>' + priorityPill(item.priority) + '</td>';
            html += '<td>';
            const tags = (item.tags || []).filter(t => t !== 'night-agent-backlog');
            html += tags.map(t => typeBadge(t)).join(' ');
            html += '</td>';
            html += '<td style="color:#374151;font-size:0.85em">' + formatTime(item.created_at) + '</td>';
            html += '</tr>';
        }
        html += '</tbody></table>';

        el.innerHTML = html;
    }

    async function poll() {
        try {
            const resp = await fetch('/self-improvement/live');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            lastData = data;

            updateStatus(data);
            updateProgress(data);
            updateSummary(data);
            updateResults(data);
            updateBacklog(data);
        } catch (err) {
            console.error('Poll failed:', err);
            document.getElementById('lastPoll').textContent = 'poll failed';
        }
    }

    poll();
    setInterval(poll, POLL_INTERVAL);
    </script>
</body>
</html>
