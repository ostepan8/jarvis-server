<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. — Night Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff; }
            50% { text-shadow: 0 0 20px #00f0ff, 0 0 30px #00f0ff, 0 0 40px #00f0ff; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes progressPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(0, 240, 255, 0.4); }
            50% { box-shadow: 0 0 16px rgba(0, 240, 255, 0.8); }
        }

        body {
            font-family: 'Rajdhani', 'Courier New', monospace;
            background: #0a0e27;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(0, 240, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 145, 0, 0.03) 0%, transparent 50%),
                linear-gradient(180deg, #0a0e27 0%, #1a1f3a 100%);
            color: #c8d6e5;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 240, 255, 0.03) 2px, rgba(0, 240, 255, 0.03) 4px);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* Nav */
        .nav {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .nav-link {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: #00f0ff;
            padding: 10px 20px;
            font-family: 'Orbitron', monospace;
            font-size: 0.85em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.3s;
        }
        .nav-link:hover {
            border-color: #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
            background: rgba(0, 240, 255, 0.15);
        }
        .nav-link.active {
            border-color: #ff9100;
            color: #ff9100;
            box-shadow: 0 0 15px rgba(255, 145, 0, 0.5);
        }

        /* Header */
        header {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1) 0%, rgba(255, 145, 0, 0.1) 100%);
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 30px 40px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2), inset 0 0 20px rgba(0, 240, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 25%;
            height: 2px;
            background: linear-gradient(90deg, #00f0ff, transparent);
            animation: scan 3s ease-in-out infinite;
        }
        header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.8em;
            font-weight: 900;
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        header h1 span {
            color: #ff9100;
        }
        .header-meta {
            text-align: right;
            font-family: 'Rajdhani', monospace;
        }

        /* Status badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            font-family: 'Orbitron', monospace;
            font-size: 0.8em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid;
            margin-bottom: 6px;
        }
        .status-badge .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-idle { border-color: #636e72; color: #636e72; }
        .status-idle .dot { background: #636e72; }
        .status-running { border-color: #00f0ff; color: #00f0ff; animation: pulse 2s infinite; }
        .status-running .dot { background: #00f0ff; box-shadow: 0 0 8px #00f0ff; }
        .status-paused { border-color: #ff9100; color: #ff9100; }
        .status-paused .dot { background: #ff9100; }
        .status-error { border-color: #ff4757; color: #ff4757; }
        .status-error .dot { background: #ff4757; }

        .last-poll {
            color: #636e72;
            font-size: 0.85em;
        }

        /* Grid layout */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .grid .full-width {
            grid-column: 1 / -1;
        }

        /* Card */
        .card {
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.2);
            padding: 24px;
            animation: fadeIn 0.4s ease-out;
        }
        .card-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.9em;
            font-weight: 700;
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.15);
        }

        /* Progress bar */
        .progress-wrapper {
            margin: 12px 0;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            margin-bottom: 6px;
            color: #a0aec0;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.2);
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f0ff, #0080ff);
            transition: width 0.5s ease;
        }
        .progress-fill.active {
            animation: progressPulse 1.5s infinite;
        }

        /* Current task */
        .current-task {
            background: rgba(0, 240, 255, 0.06);
            border: 1px solid rgba(0, 240, 255, 0.25);
            padding: 16px;
            margin-top: 12px;
        }
        .current-task-label {
            font-family: 'Orbitron', monospace;
            font-size: 0.7em;
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .current-task-title {
            font-size: 1.1em;
            color: #f0f0f0;
            font-weight: 600;
        }

        /* Type badge */
        .type-badge {
            display: inline-block;
            padding: 2px 10px;
            font-size: 0.72em;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid;
        }
        .type-test_failure { color: #ff4757; border-color: #ff4757; background: rgba(255, 71, 87, 0.1); }
        .type-log_error { color: #ff9100; border-color: #ff9100; background: rgba(255, 145, 0, 0.1); }
        .type-code_quality { color: #00f0ff; border-color: #00f0ff; background: rgba(0, 240, 255, 0.1); }
        .type-manual_todo { color: #a29bfe; border-color: #a29bfe; background: rgba(162, 155, 254, 0.1); }

        /* Priority pill */
        .priority-pill {
            display: inline-block;
            padding: 1px 8px;
            font-size: 0.7em;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 2px;
        }
        .priority-urgent { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        .priority-high { background: rgba(255, 145, 0, 0.2); color: #ff9100; }
        .priority-medium { background: rgba(0, 240, 255, 0.15); color: #00f0ff; }
        .priority-low { background: rgba(99, 110, 114, 0.25); color: #b2bec3; }

        /* Results feed */
        .result-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 240, 255, 0.08);
            animation: fadeIn 0.3s ease-out;
        }
        .result-item:last-child { border-bottom: none; }

        .result-icon {
            font-size: 1.2em;
            min-width: 24px;
            text-align: center;
            margin-top: 2px;
        }
        .result-icon.success { color: #2ed573; }
        .result-icon.failure { color: #ff4757; }
        .result-icon.skipped { color: #636e72; }

        .result-body { flex: 1; }
        .result-title {
            font-weight: 600;
            color: #f0f0f0;
            margin-bottom: 4px;
        }
        .result-meta {
            font-size: 0.85em;
            color: #636e72;
        }
        .result-error {
            font-size: 0.85em;
            color: #ff4757;
            margin-top: 4px;
            padding: 6px 10px;
            background: rgba(255, 71, 87, 0.08);
            border-left: 2px solid #ff4757;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        .result-pr {
            display: inline-block;
            margin-top: 4px;
            color: #00f0ff;
            text-decoration: none;
            font-size: 0.85em;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
        }
        .result-pr:hover { border-bottom-color: #00f0ff; }

        .results-scroll {
            max-height: 420px;
            overflow-y: auto;
        }
        .results-scroll::-webkit-scrollbar { width: 4px; }
        .results-scroll::-webkit-scrollbar-track { background: transparent; }
        .results-scroll::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); }

        /* Backlog table */
        .backlog-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92em;
        }
        .backlog-table th {
            text-align: left;
            font-family: 'Orbitron', monospace;
            font-size: 0.72em;
            font-weight: 700;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.15);
        }
        .backlog-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.06);
            color: #c8d6e5;
        }
        .backlog-table tr:hover td {
            background: rgba(0, 240, 255, 0.03);
        }
        .backlog-id {
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            color: #636e72;
        }

        /* Summary stats */
        .stats-row {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .stat {
            flex: 1;
            min-width: 120px;
            text-align: center;
            padding: 16px;
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.12);
        }
        .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 1.8em;
            font-weight: 900;
            color: #00f0ff;
        }
        .stat-value.success { color: #2ed573; }
        .stat-value.failure { color: #ff4757; }
        .stat-value.neutral { color: #636e72; }
        .stat-label {
            font-size: 0.8em;
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #636e72;
        }
        .empty-state-icon {
            font-size: 2em;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 12px; }
            .header-meta { text-align: left; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/admin/dashboard/html" class="nav-link">Admin</a>
            <a href="/admin/logs/html" class="nav-link">Logs</a>
            <a href="/self-improvement/dashboard" class="nav-link active">Night Mode</a>
        </nav>

        <header>
            <div>
                <h1>Night <span>Mode</span></h1>
            </div>
            <div class="header-meta">
                <div id="statusBadge" class="status-badge status-idle">
                    <span class="dot"></span>
                    <span id="statusText">Idle</span>
                </div>
                <div id="lastPoll" class="last-poll">—</div>
            </div>
        </header>

        <!-- Live progress -->
        <div class="grid">
            <div class="card" id="progressCard">
                <div class="card-title">Live Progress</div>
                <div id="progressContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">○</div>
                        No active cycle. Waiting for nightfall.
                    </div>
                </div>
            </div>

            <!-- Report summary -->
            <div class="card" id="summaryCard">
                <div class="card-title">Last Report</div>
                <div id="summaryContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">—</div>
                        No reports on file yet.
                    </div>
                </div>
            </div>

            <!-- Results feed -->
            <div class="card full-width" id="resultsCard">
                <div class="card-title">Results Feed</div>
                <div id="resultsContent" class="results-scroll">
                    <div class="empty-state">
                        <div class="empty-state-icon">…</div>
                        Results will stream in once a cycle begins.
                    </div>
                </div>
            </div>

            <!-- Backlog -->
            <div class="card full-width" id="backlogCard">
                <div class="card-title">Backlog</div>
                <div id="backlogContent">
                    <div class="empty-state">
                        <div class="empty-state-icon">○</div>
                        Backlog is empty. Nothing failed hard enough to land here.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const POLL_INTERVAL = 3000;
    let lastData = null;

    function formatDuration(seconds) {
        if (!seconds || seconds < 0) return '—';
        if (seconds < 60) return seconds.toFixed(1) + 's';
        const m = Math.floor(seconds / 60);
        const s = (seconds % 60).toFixed(0);
        return m + 'm ' + s + 's';
    }

    function formatTime(iso) {
        if (!iso) return '—';
        try {
            const d = new Date(iso);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } catch { return iso; }
    }

    function typeBadge(type) {
        const clean = (type || '').replace('DiscoveryType.', '');
        return '<span class="type-badge type-' + clean + '">' + clean.replace(/_/g, ' ') + '</span>';
    }

    function priorityPill(p) {
        const pr = (p || 'medium').toLowerCase();
        return '<span class="priority-pill priority-' + pr + '">' + pr + '</span>';
    }

    function resultIcon(success, skipped) {
        if (skipped) return '<div class="result-icon skipped">⊘</div>';
        return success
            ? '<div class="result-icon success">✓</div>'
            : '<div class="result-icon failure">✗</div>';
    }

    function updateStatus(data) {
        const badge = document.getElementById('statusBadge');
        const text = document.getElementById('statusText');

        badge.className = 'status-badge';

        if (data.cycle_error) {
            badge.classList.add('status-error');
            text.textContent = 'Error';
        } else if (data.running || (data.cycle_state && data.cycle_state.status === 'in_progress')) {
            badge.classList.add('status-running');
            text.textContent = 'Running';
        } else if (data.cycle_state && data.cycle_state.status === 'paused') {
            badge.classList.add('status-paused');
            text.textContent = 'Paused';
        } else if (data.night_mode) {
            badge.classList.add('status-running');
            text.textContent = 'Night Mode Active';
        } else {
            badge.classList.add('status-idle');
            text.textContent = 'Idle';
        }

        document.getElementById('lastPoll').textContent =
            'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function updateProgress(data) {
        const el = document.getElementById('progressContent');
        const cs = data.cycle_state;

        if (!cs && !data.running) {
            if (data.cycle_error) {
                el.innerHTML =
                    '<div class="current-task" style="border-color:#ff4757">' +
                    '<div class="current-task-label" style="color:#ff4757">Cycle Error</div>' +
                    '<div class="result-error">' + escapeHtml(data.cycle_error) + '</div></div>';
            } else {
                el.innerHTML =
                    '<div class="empty-state"><div class="empty-state-icon">○</div>No active cycle. Waiting for nightfall.</div>';
            }
            return;
        }

        if (!cs) {
            el.innerHTML =
                '<div class="current-task"><div class="current-task-label">Status</div>' +
                '<div class="current-task-title">Cycle running (no state file yet)...</div></div>';
            return;
        }

        const done = cs.completed_results ? cs.completed_results.length : 0;
        const total = cs.total_tasks || 0;
        const pct = total > 0 ? Math.round((cs.current_task_index / total) * 100) : 0;
        const isActive = cs.status === 'in_progress';

        // Current task name
        let currentTitle = 'Finishing up...';
        if (cs.current_task_index < total && cs.discoveries && cs.discoveries[cs.current_task_index]) {
            currentTitle = cs.discoveries[cs.current_task_index].title || 'Processing...';
        }

        let html = '';
        html += '<div class="progress-wrapper">';
        html += '<div class="progress-label"><span>Task ' + cs.current_task_index + ' of ' + total + '</span>';
        html += '<span>' + pct + '%</span></div>';
        html += '<div class="progress-bar"><div class="progress-fill' + (isActive ? ' active' : '') + '" style="width:' + pct + '%"></div></div>';
        html += '</div>';

        if (isActive && cs.current_task_index < total) {
            html += '<div class="current-task">';
            html += '<div class="current-task-label">Currently Working On</div>';
            html += '<div class="current-task-title">' + escapeHtml(currentTitle) + '</div>';
            html += '</div>';
        } else if (cs.status === 'paused') {
            const remaining = total - cs.current_task_index;
            html += '<div class="current-task" style="border-color:#ff9100">';
            html += '<div class="current-task-label" style="color:#ff9100">Paused</div>';
            html += '<div class="current-task-title">' + remaining + ' tasks remaining. Awaiting resumption.</div>';
            html += '</div>';
        }

        // Quick stats
        if (done > 0) {
            const successes = cs.completed_results.filter(r => r.success).length;
            const failures = done - successes;
            html += '<div class="stats-row" style="margin-top:16px">';
            html += '<div class="stat"><div class="stat-value success">' + successes + '</div><div class="stat-label">Succeeded</div></div>';
            html += '<div class="stat"><div class="stat-value failure">' + failures + '</div><div class="stat-label">Failed</div></div>';
            html += '<div class="stat"><div class="stat-value neutral">' + cs.skipped_count + '</div><div class="stat-label">Skipped</div></div>';
            html += '</div>';
        }

        el.innerHTML = html;
    }

    function updateSummary(data) {
        const el = document.getElementById('summaryContent');
        const report = data.latest_report;

        if (!report) {
            el.innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">—</div>No reports on file yet.</div>';
            return;
        }

        let html = '<div class="stats-row">';
        html += '<div class="stat"><div class="stat-value">' + report.tasks_attempted + '</div><div class="stat-label">Attempted</div></div>';
        html += '<div class="stat"><div class="stat-value success">' + report.tasks_succeeded + '</div><div class="stat-label">Succeeded</div></div>';
        html += '<div class="stat"><div class="stat-value failure">' + report.tasks_failed + '</div><div class="stat-label">Failed</div></div>';
        html += '<div class="stat"><div class="stat-value neutral">' + (report.skipped_count || 0) + '</div><div class="stat-label">Skipped</div></div>';
        html += '</div>';

        html += '<div style="margin-top:16px;color:#636e72;font-size:0.85em">';
        html += '<div>Files changed: <span style="color:#c8d6e5">' + report.total_files_changed + '</span></div>';
        html += '<div>Duration: <span style="color:#c8d6e5">' + formatDuration(report.total_duration_seconds) + '</span></div>';
        html += '<div>Discoveries: <span style="color:#c8d6e5">' + (report.discoveries_count || '—') + '</span></div>';
        html += '<div>Completed: <span style="color:#c8d6e5">' + formatTime(report.completed_at) + '</span></div>';
        html += '</div>';

        el.innerHTML = html;
    }

    function updateResults(data) {
        const el = document.getElementById('resultsContent');
        let results = [];

        // Prefer live cycle results, fall back to report results
        if (data.cycle_state && data.cycle_state.completed_results && data.cycle_state.completed_results.length > 0) {
            results = data.cycle_state.completed_results;
        } else if (data.latest_report && data.latest_report.results) {
            results = data.latest_report.results;
        }

        if (results.length === 0) {
            el.innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">…</div>Results will stream in once a cycle begins.</div>';
            return;
        }

        // Show newest first
        const reversed = [...results].reverse();
        let html = '';
        for (const r of reversed) {
            html += '<div class="result-item">';
            html += resultIcon(r.success);
            html += '<div class="result-body">';
            html += '<div class="result-title">' + escapeHtml(r.task_title) + '</div>';
            html += '<div class="result-meta">';
            html += typeBadge(r.discovery_type) + ' ';
            html += '<span style="margin-left:4px">' + formatDuration(r.duration_seconds) + '</span>';
            if (r.files_changed) html += ' · ' + r.files_changed + ' files';
            if (r.test_passed) html += ' · tests passed';
            if (r.merged) html += ' · merged';
            html += '</div>';
            if (r.error_message) {
                html += '<div class="result-error">' + escapeHtml(r.error_message) + '</div>';
            }
            if (r.pr_url) {
                html += '<a href="' + escapeHtml(r.pr_url) + '" target="_blank" class="result-pr">View PR →</a>';
            }
            html += '</div></div>';
        }

        el.innerHTML = html;
    }

    function updateBacklog(data) {
        const el = document.getElementById('backlogContent');
        const items = data.backlog || [];

        if (items.length === 0) {
            el.innerHTML =
                '<div class="empty-state"><div class="empty-state-icon">○</div>Backlog is empty. Nothing failed hard enough to land here.</div>';
            return;
        }

        let html = '<table class="backlog-table">';
        html += '<thead><tr><th>ID</th><th>Title</th><th>Priority</th><th>Tags</th><th>Created</th></tr></thead>';
        html += '<tbody>';
        for (const item of items) {
            html += '<tr>';
            html += '<td class="backlog-id">' + escapeHtml((item.id || '').slice(0, 8)) + '</td>';
            html += '<td>' + escapeHtml(item.title || '—') + '</td>';
            html += '<td>' + priorityPill(item.priority) + '</td>';
            html += '<td>';
            const tags = (item.tags || []).filter(t => t !== 'night-agent-backlog');
            html += tags.map(t => typeBadge(t)).join(' ');
            html += '</td>';
            html += '<td style="color:#636e72;font-size:0.85em">' + formatTime(item.created_at) + '</td>';
            html += '</tr>';
        }
        html += '</tbody></table>';

        el.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    async function poll() {
        try {
            const resp = await fetch('/self-improvement/live');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            lastData = data;

            updateStatus(data);
            updateProgress(data);
            updateSummary(data);
            updateResults(data);
            updateBacklog(data);
        } catch (err) {
            console.error('Poll failed:', err);
            document.getElementById('lastPoll').textContent = 'Poll failed: ' + err.message;
        }
    }

    // Initial poll, then interval
    poll();
    setInterval(poll, POLL_INTERVAL);
    </script>
</body>
</html>
